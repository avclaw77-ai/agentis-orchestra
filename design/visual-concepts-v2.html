<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentisOrchestra -- Visual Concepts V2</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', sans-serif; background: #050A12; color: #fff; overflow-x: hidden; }

.section { min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; }

/* ═══════════════════════════════════════════════════════════════════
   CONCEPT A: LIVING NETWORK
   Agents as particles in a force-directed graph. They move, connect,
   form clusters (departments). The network breathes. When you hover,
   connections intensify. Soul Engine = particles gradually growing.
   ═══════════════════════════════════════════════════════════════════ */
#canvas-network { position: absolute; inset: 0; z-index: 0; }

.hero-text {
  position: relative; z-index: 1; text-align: center; pointer-events: none;
}
.hero-text h1 {
  font-size: clamp(48px, 8vw, 120px); font-weight: 800; letter-spacing: -0.05em;
  line-height: 0.9; color: #fff; mix-blend-mode: difference;
}
.hero-text h1 span {
  display: block; font-weight: 200; font-size: 0.35em; letter-spacing: 0.15em;
  text-transform: uppercase; margin-top: 16px; opacity: 0.6;
}
.hero-badge {
  margin-top: 32px; font-size: 13px; font-weight: 600; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════════════════
   CONCEPT B: WAVEFORM ORCHESTRA
   Sound waves representing each department. They pulse at different
   frequencies. The CEO frequency modulates all others. Visualizes
   "orchestration" as literal waveform coordination.
   ═══════════════════════════════════════════════════════════════════ */
.section-wave { background: #FAFBFD; }
#canvas-wave { position: absolute; inset: 0; z-index: 0; }

.wave-text {
  position: relative; z-index: 1; text-align: center;
}
.wave-text h1 {
  font-size: clamp(42px, 7vw, 100px); font-weight: 800; letter-spacing: -0.04em;
  color: #0C1929; line-height: 0.95;
}
.wave-text h1 em { font-style: normal; color: #0284C7; }
.wave-text p {
  font-size: 16px; color: #526378; margin-top: 12px; font-weight: 300;
}

/* ═══════════════════════════════════════════════════════════════════
   CONCEPT C: MORPHING TOPOLOGY
   An abstract 3D mesh that continuously morphs -- representing agent
   personas evolving (Soul Engine). Low-poly at first, becoming more
   refined as you scroll. The mesh is the agent's "soul" taking shape.
   ═══════════════════════════════════════════════════════════════════ */
.section-morph { background: linear-gradient(180deg, #F0F9FF 0%, #E0F2FE 100%); }
#canvas-morph { position: absolute; inset: 0; z-index: 0; }

.morph-text {
  position: relative; z-index: 1; text-align: center;
}
.morph-text .kicker {
  font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: #0284C7; margin-bottom: 12px;
}
.morph-text h1 {
  font-size: clamp(36px, 6vw, 80px); font-weight: 800; letter-spacing: -0.03em;
  color: #0C1929; line-height: 1;
}
.morph-text p {
  font-size: 15px; color: #526378; margin-top: 12px; font-weight: 300; max-width: 500px; margin-left: auto; margin-right: auto;
}

/* Billboard label */
.billboard-label {
  position: absolute; top: 24px; left: 24px; z-index: 10;
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 6px 16px; border-radius: 100px;
}
.bl-dark { color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
.bl-light { color: #0284C7; border: 1px solid rgba(2,132,199,0.2); background: rgba(2,132,199,0.05); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     CONCEPT A: LIVING NETWORK
     ═══════════════════════════════════════════════════════════════════ -->
<section class="section" id="network">
  <div class="billboard-label bl-dark">Concept A -- Living Network</div>
  <canvas id="canvas-network"></canvas>
  <div class="hero-text">
    <h1>Orchestra<span>Your AI team, orchestrated</span></h1>
  </div>
  <div class="hero-badge">agentislab.ai</div>
</section>

<!-- ═══════════════════════════════════════════════════════════════════
     CONCEPT B: WAVEFORM ORCHESTRA
     ═══════════════════════════════════════════════════════════════════ -->
<section class="section section-wave" id="wave">
  <div class="billboard-label bl-light">Concept B -- Waveform</div>
  <canvas id="canvas-wave"></canvas>
  <div class="wave-text">
    <h1>Agentis<em>Orchestra</em></h1>
    <p>Your AI team, orchestrated.</p>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════════
     CONCEPT C: MORPHING TOPOLOGY
     ═══════════════════════════════════════════════════════════════════ -->
<section class="section section-morph" id="morph">
  <div class="billboard-label bl-light">Concept C -- Soul Topology</div>
  <canvas id="canvas-morph"></canvas>
  <div class="morph-text">
    <div class="kicker">Soul Engine</div>
    <h1>Agents that evolve.</h1>
    <p>The only platform where AI agents get better the more they work.</p>
  </div>
</section>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONCEPT A: LIVING NETWORK -- Force-directed particle system
// ═══════════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('canvas-network');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Department colors
  const DEPTS = [
    { color: '#0284C7', count: 1, size: 6, label: 'CEO' },      // CEO
    { color: '#3B82F6', count: 4, size: 3.5, label: 'Eng' },     // Engineering
    { color: '#8B5CF6', count: 2, size: 3, label: 'Design' },    // Design
    { color: '#10B981', count: 3, size: 3, label: 'Ops' },       // Operations
    { color: '#F59E0B', count: 2, size: 3, label: 'RnD' },       // Research
  ];

  const particles = [];
  const mouse = { x: -1000, y: -1000 };

  // Create particles in department clusters
  let angle = 0;
  DEPTS.forEach((dept, di) => {
    const cx = canvas.width * (0.3 + di * 0.1);
    const cy = canvas.height * (0.3 + (di % 2) * 0.3);
    for (let i = 0; i < dept.count; i++) {
      const a = angle + (Math.PI * 2 / dept.count) * i;
      const r = 60 + Math.random() * 80;
      particles.push({
        x: cx + Math.cos(a) * r,
        y: cy + Math.sin(a) * r,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: dept.size + Math.random() * 2,
        color: dept.color,
        dept: di,
        baseSize: dept.size,
        pulse: Math.random() * Math.PI * 2,
      });
    }
    angle += 1.2;
  });

  // Add ambient particles
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      size: 1 + Math.random(),
      color: 'rgba(2,132,199,0.3)',
      dept: -1,
      baseSize: 1,
      pulse: Math.random() * Math.PI * 2,
    });
  }

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background gradient
    const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width * 0.7);
    grad.addColorStop(0, '#0A1628');
    grad.addColorStop(1, '#050A12');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const t = Date.now() * 0.001;

    // Update + draw connections
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.02;

      // Bounce
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

      // Soul Engine effect: particles slowly grow
      p.size = p.baseSize + Math.sin(p.pulse) * 1.5;

      // Mouse attraction
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200 && dist > 10) {
        p.vx += dx / dist * 0.02;
        p.vy += dy / dist * 0.02;
      }

      // Damping
      p.vx *= 0.99;
      p.vy *= 0.99;

      // Draw connections
      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const cx = p.x - q.x;
        const cy = p.y - q.y;
        const cd = Math.sqrt(cx*cx + cy*cy);
        const maxDist = (p.dept === q.dept && p.dept >= 0) ? 200 : 120;

        if (cd < maxDist) {
          const alpha = (1 - cd / maxDist) * (p.dept === q.dept ? 0.3 : 0.08);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#', '');
          // Fallback for hex colors
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = p.dept >= 0 ? p.color : '#0284C7';
          ctx.lineWidth = 0.5;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }

    // Draw particles
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0, p.size), 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();

      // Glow for main agents
      if (p.dept >= 0 && p.baseSize > 2) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
        glow.addColorStop(0, p.color.replace(')', ',0.15)').replace('rgb', 'rgba'));
        glow.addColorStop(0, `${p.color}22`);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fill();
      }
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════════════════════════
// CONCEPT B: WAVEFORM -- Layered sine waves per department
// ═══════════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('canvas-wave');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const waves = [
    { color: '#0284C7', freq: 0.008, amp: 30, speed: 0.6, y: 0.25, width: 2.5, label: 'CEO' },
    { color: '#3B82F6', freq: 0.012, amp: 20, speed: 0.9, y: 0.35, width: 1.5 },
    { color: '#8B5CF6', freq: 0.015, amp: 15, speed: 1.2, y: 0.55, width: 1.5 },
    { color: '#10B981', freq: 0.02, amp: 25, speed: 0.7, y: 0.65, width: 1.5 },
    { color: '#F59E0B', freq: 0.01, amp: 18, speed: 1.0, y: 0.75, width: 1 },
  ];

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * 0.001;

    waves.forEach((wave, wi) => {
      ctx.beginPath();
      ctx.moveTo(0, canvas.height * wave.y);

      for (let x = 0; x <= canvas.width; x += 2) {
        const ceoMod = Math.sin(t * 0.3 + x * 0.002) * 0.5 + 0.5; // CEO modulates all
        const y = canvas.height * wave.y +
          Math.sin(x * wave.freq + t * wave.speed) * wave.amp * (0.7 + ceoMod * 0.3) +
          Math.sin(x * wave.freq * 2.3 + t * wave.speed * 0.7) * wave.amp * 0.3;
        ctx.lineTo(x, y);
      }

      ctx.strokeStyle = wave.color;
      ctx.lineWidth = wave.width;
      ctx.globalAlpha = wi === 0 ? 0.6 : 0.25;
      ctx.stroke();
      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════════════════════════
// CONCEPT C: MORPHING TOPOLOGY -- Mesh that evolves
// ═══════════════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('canvas-morph');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLS = 30;
  const ROWS = 20;
  const points = [];

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      points.push({
        baseX: (c / (COLS - 1)),
        baseY: (r / (ROWS - 1)),
        x: 0, y: 0,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * 0.0008;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const scale = Math.min(canvas.width, canvas.height) * 0.7;

    // Update points
    points.forEach(p => {
      const morphX = Math.sin(t + p.baseY * 4 + p.phase) * 0.06;
      const morphY = Math.cos(t * 0.7 + p.baseX * 5 + p.phase) * 0.08;
      p.x = cx + (p.baseX - 0.5 + morphX) * scale;
      p.y = cy + (p.baseY - 0.5 + morphY) * scale;
    });

    // Draw mesh lines
    ctx.strokeStyle = '#0284C7';
    ctx.lineWidth = 0.5;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const p = points[idx];

        // Distance from center for opacity
        const dx = (p.x - cx) / scale;
        const dy = (p.y - cy) / scale;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const alpha = Math.max(0, 0.25 - dist * 0.4);

        ctx.globalAlpha = alpha;

        // Right connection
        if (c < COLS - 1) {
          const right = points[idx + 1];
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(right.x, right.y);
          ctx.stroke();
        }

        // Down connection
        if (r < ROWS - 1) {
          const down = points[idx + COLS];
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(down.x, down.y);
          ctx.stroke();
        }

        // Node dots (only some, for visual interest)
        if ((r + c) % 3 === 0) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 1.5 + Math.sin(t + p.phase) * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = '#0284C7';
          ctx.globalAlpha = alpha * 1.5;
          ctx.fill();
        }
      }
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
