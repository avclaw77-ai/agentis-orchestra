# =============================================================================
# AgentisOrchestra -- Deploy Pipeline
# Manual trigger or push to main
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/workflows/ci.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agentis-orchestra

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-app:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push bridge image
        uses: docker/build-push-action@v6
        with:
          context: ./bridge
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-bridge:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_PREFIX }}-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/agentis-orchestra' }}

            # Pull latest images
            docker pull ${{ env.IMAGE_PREFIX }}-app:${{ needs.build-and-push.outputs.sha_short }}
            docker pull ${{ env.IMAGE_PREFIX }}-bridge:${{ needs.build-and-push.outputs.sha_short }}

            # Tag as current
            docker tag ${{ env.IMAGE_PREFIX }}-app:${{ needs.build-and-push.outputs.sha_short }} agentis-orchestra-app:current
            docker tag ${{ env.IMAGE_PREFIX }}-bridge:${{ needs.build-and-push.outputs.sha_short }} agentis-orchestra-bridge:current

            # Restart with new images
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for services
            sleep 10

            # Health check
            bash scripts/healthcheck.sh || echo "WARNING: Health check failed after deploy"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/agentis-orchestra' }}
            docker compose -f docker-compose.prod.yml ps
            echo ""
            echo "Deploy complete: ${{ needs.build-and-push.outputs.sha_short }}"
